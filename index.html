<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon: the actual PHS crest (generated from public/crest.png). -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#7a1620" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pensacola High School Student Government Association — Home of the Tigers."
    />
    <title>Pensacola High School SGA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!--
      SnapWidget — powers the Instagram feed iframe on the homepage. This script
      makes the embedded widget auto-resize. The widget itself is configured at
      snapwidget.com; paste the resulting widget ID into SNAPWIDGET_ID in
      src/pages/Home.jsx. Loading the script with no widget present is harmless.
    -->
    <script src="https://snapwidget.com/js/snapwidget.js"></script>
  </head>
  <body>
    <!--
      This is the Vite entry shell. The homepage markup lives in React:
      src/pages/Home.jsx (rendered by src/App.jsx, mounted by src/main.jsx).
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
