name: Deploy Supabase Edge Functions

# Deploys every Edge Function under supabase/functions/ whenever they (or the
# Supabase config) change on main. Requires a repo secret SUPABASE_ACCESS_TOKEN
# (a Supabase personal access token from
# https://supabase.com/dashboard/account/tokens).
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: igwmqvsfqgtkhrtdvwwq
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all edge functions
        run: |
          for fn in supabase/functions/*/; do
            name="$(basename "$fn")"
            echo "Deploying $name…"
            supabase functions deploy "$name" --project-ref "$PROJECT_REF"
          done
